name: "online_softmax"
problem_id: "softmax_dim1"
description: "Softmax along dimension 1 on a large 2D tensor"
optimization_hints: >
  Consider online/streaming softmax algorithms, tiling strategies,
  or fused log-sum-exp approaches. Warp-level reductions can help.

ref_source: |
  import torch
  import torch.nn as nn

  class Model(nn.Module):
      def __init__(self, dim: int = 1):
          super().__init__()
          self.dim = dim

      def forward(self, x: torch.Tensor) -> torch.Tensor:
          return torch.softmax(x, dim=self.dim)

  def get_inputs():
      return [torch.randn(16, 16384, device='cuda')]

  def get_init_inputs():
      return [1]

backend: "cuda"
precision: "fp32"
quick_perf_trials: 4
full_perf_trials: 20
